<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="900" viewBox="0 0 2000 900" role="img" aria-label="Sanctuary photo placeholder">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <radialGradient id="r" cx="50%" cy="35%" r="70%">
      <stop offset="0" stop-color="#94a3b8" stop-opacity=".35"/>
      <stop offset="1" stop-color="#0b1220" stop-opacity=".0"/>
    </radialGradient>
  </defs>
  <rect width="2000" height="900" fill="url(#g)"/>
  <rect width="2000" height="900" fill="url(#r)"/>
  <!-- subtle pew-like lines -->
  <g opacity="0.22" stroke="#e2e8f0" stroke-width="3">
    <path d="M0 520 L2000 420"/>
    <path d="M0 570 L2000 470"/>
    <path d="M0 620 L2000 520"/>
    <path d="M0 670 L2000 570"/>
    <path d="M0 720 L2000 620"/>
    <path d="M0 770 L2000 670"/>
  </g>
  <!-- vignette -->
  <rect width="2000" height="900" fill="#000" opacity="0.25"/>
  <text x="1000" y="470" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="44" fill="#e2e8f0" opacity="0.75">hero image placeholder</text>
</svg>
